<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Empty Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h1>The Empty Store</h1>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>Curated. Minimal. Powerful.</h2>
    <p>Premium pieces from Umduvulo</p>
  </section>

  <!-- PRODUCTS -->
  <section class="products">

    <div class="product-card">
      <img src="https://via.placeholder.com/300" alt="T-shirt">
      <h3>Umduvulo T-Shirt</h3>
      <p>R499</p>
      <button onclick="buyNow('Umduvulo T-Shirt', 'R499')">Buy Now</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/300" alt="Chain">
      <h3>Steel Chain</h3>
      <p>R299</p>
      <button onclick="buyNow('Steel Chain', 'R299')">Buy Now</button>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
